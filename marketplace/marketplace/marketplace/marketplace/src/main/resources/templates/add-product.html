<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Product</title>

    <style>

        body {

            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
        }

        .box {

            background: white;

            padding: 20px;

            width: 400px;

            margin: auto;

            border-radius: 10px;
        }

        input, textarea {

            width: 100%;

            padding: 10px;

            margin-top: 10px;
        }

        button {

            margin-top: 15px;

            width: 100%;

            padding: 10px;

            background: purple;

            color: white;

            border: none;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Sell Product</h2>

    <input type="text"
           id="title"
           placeholder="Title">

    <textarea id="description"
              placeholder="Description"></textarea>

    <input type="number"
           id="price"
           placeholder="Price">

    <input type="text"
           id="category"
           placeholder="Category">

    <input type="text"
           id="imageUrl"
           placeholder="Image Name">

    <input type="text"
           id="location"
           placeholder="Location">

    <button onclick="addProduct()">
        Add Product
    </button>

</div>

<script>

    async function addProduct() {

        const token =
            localStorage.getItem("token");

        const response =
            await fetch(
                "http://localhost:8080/api/products/add",
                {

                    method: "POST",

                    headers: {

                        "Content-Type":
                            "application/json",

                        "Authorization":
                            "Bearer " + token
                    },

                    body: JSON.stringify({

                        title:
                            document.getElementById("title").value,

                        description:
                            document.getElementById("description").value,

                        price:
                            document.getElementById("price").value,

                        category:
                            document.getElementById("category").value,

                        imageUrl:
                            document.getElementById("imageUrl").value,

                        location:
                            document.getElementById("location").value
                    })
                }
            );

        alert("Product Added Successfully");

        window.location.href = "/";
    }

</script>

</body>
</html>
