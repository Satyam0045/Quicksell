<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Login</title>

    <style>

        body {

            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
        }

        .box {

            background: white;

            padding: 20px;

            width: 300px;

            margin: auto;

            border-radius: 10px;
        }

        input {

            width: 100%;

            padding: 10px;

            margin-top: 10px;
        }

        button {

            margin-top: 15px;

            width: 100%;

            padding: 10px;

            background: blue;

            color: white;

            border: none;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Login</h2>

    <input type="email"
           id="email"
           placeholder="Email">

    <input type="password"
           id="password"
           placeholder="Password">

    <button onclick="login()">
        Login
    </button>

</div>

<script>

    async function login() {

        const email =
            document.getElementById("email").value;

        const password =
            document.getElementById("password").value;

        const response =
            await fetch(
                "http://localhost:8080/api/users/login",
                {

                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify({

                        email,
                        password
                    })
                }
            );

        const token =
            await response.text();

        localStorage.setItem("token", token);

        alert("Login Successful");

        window.location.href = "/";
    }

</script>

</body>
</html>
