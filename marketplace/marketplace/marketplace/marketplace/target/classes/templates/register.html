<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Register</title>

    <style>

        body {

            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
        }

        .box {

            background: white;

            padding: 20px;

            width: 300px;

            margin: auto;

            border-radius: 10px;
        }

        input {

            width: 100%;

            padding: 10px;

            margin-top: 10px;
        }

        button {

            margin-top: 15px;

            width: 100%;

            padding: 10px;

            background: green;

            color: white;

            border: none;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Register</h2>

    <input type="text"
           id="fullName"
           placeholder="Full Name">

    <input type="email"
           id="email"
           placeholder="Email">

    <input type="password"
           id="password"
           placeholder="Password">

    <input type="text"
           id="city"
           placeholder="City">

    <button onclick="register()">
        Register
    </button>

</div>

<script>

    async function register() {

        const response =
            await fetch(
                "http://localhost:8080/api/users/register",
                {

                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify({

                        fullName:
                            document.getElementById("fullName").value,

                        email:
                            document.getElementById("email").value,

                        password:
                            document.getElementById("password").value,

                        city:
                            document.getElementById("city").value
                    })
                }
            );

        alert("Registration Successful");

        window.location.href = "/login";
    }

</script>

</body>
</html>
